# Connect your GitHub repo and Render auto-deploys

services:
  - type: web
    name: oncoai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oncoai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: oncoai-db
    plan: free
    databaseName: oncoai
