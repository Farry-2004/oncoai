<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
body { font-family: 'Inter', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; }
.header { background: linear-gradient(135deg, #EF4444, #DC2626); padding: 30px; text-align: center; }
.header h1 { color: white; margin: 0; font-size: 24px; }
.content { padding: 30px; }
.alert-box { background: #fef2f2; border-left: 4px solid #EF4444; padding: 15px; margin: 15px 0; border-radius: 4px; }
.footer { padding: 20px 30px; background: #f8f9fa; text-align: center; color: #666; font-size: 12px; }
</style></head>
<body>
<div class="container">
  <div class="header"><h1>Lab Result Alert</h1></div>
  <div class="content">
    <h2>{{ status }}: {{ test_name }}</h2>
    <div class="alert-box">
      <p><strong>Patient:</strong> {{ patient_name }}</p>
      <p><strong>Test:</strong> {{ test_name }}</p>
      <p><strong>Value:</strong> {{ test_value }}</p>
      <p><strong>Status:</strong> {{ status }}</p>
    </div>
    <p>Please review this result and take appropriate action.</p>
  </div>
  <div class="footer">OncoAI — AI-Powered Oncology & Tumor Board Platform</div>
</div>
</body>
</html>
