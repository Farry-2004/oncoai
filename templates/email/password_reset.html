<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
body { font-family: 'Inter', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; }
.header { background: linear-gradient(135deg, #0F4C5C, #0A3B48); padding: 30px; text-align: center; }
.header h1 { color: #14FFEC; margin: 0; font-size: 24px; }
.content { padding: 30px; }
.btn { display: inline-block; padding: 12px 30px; background: #0F4C5C; color: white; text-decoration: none; border-radius: 8px; margin: 15px 0; }
.footer { padding: 20px 30px; background: #f8f9fa; text-align: center; color: #666; font-size: 12px; }
</style></head>
<body>
<div class="container">
  <div class="header"><h1>Password Reset</h1></div>
  <div class="content">
    <h2>Reset Your Password</h2>
    <p>A password reset was requested for your OncoAI account. Click the button below to set a new password:</p>
    <a href="{{ reset_url }}" class="btn">Reset Password</a>
    <p>This link expires in 1 hour. If you didn't request this, you can safely ignore this email.</p>
  </div>
  <div class="footer">OncoAI — AI-Powered Oncology & Tumor Board Platform</div>
</div>
</body>
</html>
