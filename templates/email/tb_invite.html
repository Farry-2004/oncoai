<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
body { font-family: 'Inter', Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; }
.header { background: linear-gradient(135deg, #0F4C5C, #0A3B48); padding: 30px; text-align: center; }
.header h1 { color: #14FFEC; margin: 0; font-size: 24px; }
.content { padding: 30px; }
.content h2 { color: #0F4C5C; }
.info-box { background: #e8f5f3; border-left: 4px solid #0F4C5C; padding: 15px; margin: 15px 0; border-radius: 4px; }
.footer { padding: 20px 30px; background: #f8f9fa; text-align: center; color: #666; font-size: 12px; }
</style></head>
<body>
<div class="container">
  <div class="header"><h1>Tumor Board Meeting</h1></div>
  <div class="content">
    <h2>Meeting Invitation</h2>
    <div class="info-box">
      <p><strong>Patient:</strong> {{ patient_name }}</p>
      <p><strong>Date:</strong> {{ meeting_date }}</p>
      <p><strong>Chairperson:</strong> {{ chairperson }}</p>
    </div>
    <p>You have been invited to participate in a Tumor Board meeting. Please review the patient records before the meeting.</p>
  </div>
  <div class="footer">OncoAI — AI-Powered Oncology & Tumor Board Platform</div>
</div>
</body>
</html>
