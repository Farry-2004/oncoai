name: oncoai
description: OncoAI — AI-Powered Oncology Decision Support Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.0
  connectivity_plus: ^6.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0
  path_provider: ^2.1.0

  # UI Components
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.2.0
  pull_to_refresh_flutter3: ^2.0.0

  # Native Features
  image_picker: ^1.0.0
  local_auth: ^2.2.0
  flutter_local_notifications: ^17.0.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.0
  permission_handler: ^11.3.0

  # Serialization & Utils
  json_annotation: ^4.9.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
