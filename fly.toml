# Fly.io deployment (https://fly.io)

app = "oncoai"
primary_region = "jnb"  # Johannesburg — closest to Tanzania

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
